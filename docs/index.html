<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PriceAlert Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0c0f;--surface:#131418;--border:#1f2128;--border2:#2a2d38;
      --text:#eef0f6;--muted:#6b7080;--accent:#c8f04e;--accent2:#7bf0c8;
      --danger:#ff5e5e;--radius:14px;
      --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
    #root{min-height:100vh}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIGURAZIONE ─────────────────────────────────────────────────
const APP_PASSWORD  = "cambiami123";   // ← cambia questa password
const GITHUB_OWNER  = "massime84";     // ← il tuo username GitHub
const GITHUB_REPO   = "price-alert";  // ← nome del repo
const CONFIG_FILE   = "price-alert-config.json"; // file nel repo
// ──────────────────────────────────────────────────────────────────

const SESSION_KEY  = "pa_auth";
const TOKEN_KEY    = "pa_gh_token";
const PLATFORM_META = {
  ebay:   { label:"eBay",      color:"#0064D2" },
  subito: { label:"Subito.it", color:"#e63f19" },
};
function uid(){ return Math.random().toString(36).slice(2,9); }

// ══════════════════════════════════════════════════════════════════
// GITHUB API
// ══════════════════════════════════════════════════════════════════
async function githubGetFile(token) {
  const r = await fetch(
    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${CONFIG_FILE}`,
    { headers:{ Authorization:`token ${token}`, Accept:"application/vnd.github.v3+json" } }
  );
  if (r.status === 404) return { content: null, sha: null };
  if (!r.ok) throw new Error(`GitHub GET error: ${r.status}`);
  const data = await r.json();
  const content = JSON.parse(atob(data.content.replace(/\n/g,"")));
  return { content, sha: data.sha };
}

async function githubPutFile(token, searches, sha) {
  const payload = {
    generated: new Date().toISOString(),
    searches: searches,
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
  const body = {
    message: `update ${CONFIG_FILE} via dashboard`,
    content: encoded,
    ...(sha ? { sha } : {}),
  };
  const r = await fetch(
    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${CONFIG_FILE}`,
    {
      method:"PUT",
      headers:{ Authorization:`token ${token}`, Accept:"application/vnd.github.v3+json", "Content-Type":"application/json" },
      body: JSON.stringify(body),
    }
  );
  if (!r.ok) {
    const err = await r.json();
    throw new Error(err.message || `GitHub PUT error: ${r.status}`);
  }
  return await r.json();
}

// ══════════════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════════════
function Login({ onAuth }) {
  const [val, setVal] = useState("");
  const [shake, setShake] = useState(false);
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  useEffect(()=>{ ref.current?.focus(); },[]);

  function attempt(){
    if(val === APP_PASSWORD){
      sessionStorage.setItem(SESSION_KEY,"1");
      onAuth();
    } else {
      setShake(true); setVal("");
      setTimeout(()=>setShake(false),500);
    }
  }

  return (
    <div style={S.loginWrap}>
      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .lbox{animation:fadeUp .4s cubic-bezier(.16,1,.3,1)}
        .lbox.shake input{animation:shake .4s;border-color:var(--danger)!important}
      `}</style>
      <div className={`lbox${shake?" shake":""}`} style={S.loginBox}>
        <div style={S.loginIcon}>🔔</div>
        <h1 style={S.loginTitle}>PriceAlert</h1>
        <p style={S.loginSub}>Inserisci la password per accedere</p>
        <div style={{position:"relative",marginBottom:16}}>
          <input ref={ref} type={show?"text":"password"} placeholder="Password"
            value={val} onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&attempt()} style={S.loginInput}/>
          <button onClick={()=>setShow(s=>!s)} style={S.eyeBtn}>{show?"🙈":"👁️"}</button>
        </div>
        <button onClick={attempt} style={S.loginBtn}>Accedi →</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// TOKEN SETUP (first time)
// ══════════════════════════════════════════════════════════════════
function TokenSetup({ onDone }) {
  const [val, setVal] = useState("");
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState("");

  async function verify(){
    const t = val.trim();
    if(!t) return setErr("Incolla il token GitHub");
    setTesting(true); setErr("");
    try {
      const r = await fetch(
        `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`,
        { headers:{ Authorization:`token ${t}` } }
      );
      if(!r.ok) throw new Error("Token non valido o repo non trovato");
      localStorage.setItem(TOKEN_KEY, t);
      onDone(t);
    } catch(e){
      setErr(e.message);
    } finally { setTesting(false); }
  }

  return (
    <div style={S.loginWrap}>
      <div style={{...S.loginBox, maxWidth:440}}>
        <div style={S.loginIcon}>🔑</div>
        <h1 style={{...S.loginTitle,fontSize:20}}>Collega GitHub</h1>
        <p style={{...S.loginSub,marginBottom:20}}>
          Incolla il tuo <strong style={{color:"var(--text)"}}>Personal Access Token</strong> (ghp_...) per sincronizzare automaticamente le ricerche.
        </p>
        <div style={{background:"#0e1a0a",border:"1px solid #1f3a10",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:12,fontFamily:"var(--mono)",color:"var(--accent2)",lineHeight:1.7}}>
          💡 Dove trovarlo:<br/>
          github.com → Settings → Developer settings<br/>
          → Personal access tokens → Tokens (classic)<br/>
          → usa il token <strong>GH_TOKEN_PAGES</strong> che hai creato
        </div>
        <input type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&verify()}
          style={{...S.loginInput,marginBottom:8,fontFamily:"var(--mono)",fontSize:13}}/>
        {err && <p style={{color:"var(--danger)",fontSize:13,marginBottom:12}}>{err}</p>}
        <button onClick={verify} disabled={testing}
          style={{...S.loginBtn,opacity:testing?.6:1}}>
          {testing?"Verifica in corso...":"Collega e continua →"}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [authed,   setAuthed]   = useState(()=>sessionStorage.getItem(SESSION_KEY)==="1");
  const [token,    setToken]    = useState(()=>localStorage.getItem(TOKEN_KEY)||"");
  const [searches, setSearches] = useState([]);
  const [fileSha,  setFileSha]  = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [syncing,  setSyncing]  = useState(false);
  const [syncStatus, setSyncStatus] = useState(null); // "ok"|"err"|null
  const [form,     setForm]     = useState({query:"",min:"",max:"",platforms:["ebay","subito"]});
  const [editId,   setEditId]   = useState(null);
  const [showModal,setShowModal]= useState(false);
  const [deleteTgt,setDeleteTgt]= useState(null);
  const [toast,    setToast]    = useState(null);
  const inputRef = useRef(null);

  // Load from GitHub on mount
  useEffect(()=>{
    if(authed && token) loadFromGitHub();
  },[authed, token]);

  useEffect(()=>{ if(showModal) setTimeout(()=>inputRef.current?.focus(),80); },[showModal]);

  async function loadFromGitHub(){
    setLoading(true);
    try {
      const { content, sha } = await githubGetFile(token);
      if(content?.searches) setSearches(content.searches);
      setFileSha(sha);
    } catch(e){
      showToast("Errore caricamento da GitHub: "+e.message,"err");
    } finally { setLoading(false); }
  }

  async function saveToGitHub(newSearches){
    setSyncing(true); setSyncStatus(null);
    try {
      const result = await githubPutFile(token, newSearches, fileSha);
      setFileSha(result.content.sha);
      setSyncStatus("ok");
      setTimeout(()=>setSyncStatus(null), 3000);
    } catch(e){
      setSyncStatus("err");
      showToast("Errore salvataggio: "+e.message,"err");
    } finally { setSyncing(false); }
  }

  function showToast(msg, type="ok"){
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  }

  function updateSearches(newList){
    setSearches(newList);
    saveToGitHub(newList);
  }

  function openAdd(){
    setForm({query:"",min:"",max:"",platforms:["ebay","subito"]});
    setEditId(null); setShowModal(true);
  }
  function openEdit(s){
    setForm({query:s.query,min:String(s.min),max:String(s.max),platforms:[...s.platforms]});
    setEditId(s.id); setShowModal(true);
  }
  function closeModal(){ setShowModal(false); setEditId(null); }

  function togglePlatform(p){
    setForm(f=>({...f, platforms: f.platforms.includes(p)?f.platforms.filter(x=>x!==p):[...f.platforms,p]}));
  }

  function handleSave(){
    const query = form.query.trim();
    const min = parseFloat(form.min), max = parseFloat(form.max);
    if(!query)           return showToast("Inserisci un prodotto","err");
    if(isNaN(min)||isNaN(max)||min<0||max<0) return showToast("Prezzi non validi","err");
    if(min>=max)         return showToast("Min deve essere < Max","err");
    if(!form.platforms.length) return showToast("Scegli almeno una piattaforma","err");

    let newList;
    if(editId){
      newList = searches.map(x=>x.id===editId?{...x,query,min,max,platforms:form.platforms}:x);
      showToast("Ricerca aggiornata ✓");
    } else {
      newList = [...searches,{id:uid(),query,min,max,active:true,platforms:form.platforms}];
      showToast("Ricerca aggiunta ✓");
    }
    updateSearches(newList);
    closeModal();
  }

  function toggleActive(id){
    const newList = searches.map(x=>x.id===id?{...x,active:!x.active}:x);
    updateSearches(newList);
  }

  function doDelete(){
    const newList = searches.filter(x=>x.id!==deleteTgt);
    updateSearches(newList);
    setDeleteTgt(null); showToast("Ricerca eliminata");
  }

  if(!authed) return <Login onAuth={()=>setAuthed(true)} />;
  if(!token)  return <TokenSetup onDone={t=>setToken(t)} />;

  const active = searches.filter(s=>s.active).length;

  return (
    <div style={S.page}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .card:hover{border-color:#2a2d38!important;transform:translateY(-2px);}
        .icon-btn:hover{background:#1a1c24!important;color:#eef0f6!important;}
        .del-btn:hover{background:#2a1010!important;color:#ff5e5e!important;border-color:#3a1a1a!important;}
        .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
        .toggle-on{background:var(--accent)!important;}
        .toggle-on::after{transform:translateX(18px);}
        .btn-primary:hover{background:#d8ff60!important;}
        .btn-ghost:hover{background:#1a1c24!important;color:#eef0f6!important;}
        input:focus{border-color:var(--accent)!important;outline:none;}
        .spinner{width:14px;height:14px;border:2px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
      `}</style>

      {/* HEADER */}
      <header style={S.header}>
        <div>
          <div style={S.logo}>
            <div style={S.logoIcon}>🔔</div>
            <h1 style={S.h1}>PriceAlert</h1>
          </div>
          <p style={S.subtitle}>eBay + Subito.it · notifiche email automatiche</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {/* sync status */}
          {syncing && (
            <div style={S.syncBadge}><span className="spinner"/>&nbsp;Salvataggio...</div>
          )}
          {syncStatus==="ok" && !syncing && (
            <div style={{...S.syncBadge,background:"#0e1a0a",borderColor:"#1f3a10",color:"var(--accent2)"}}>✓ Salvato su GitHub</div>
          )}
          {syncStatus==="err" && !syncing && (
            <div style={{...S.syncBadge,background:"#2a1010",borderColor:"#3a1a1a",color:"var(--danger)"}}>✗ Errore sync</div>
          )}
          <div style={S.statsPill}>
            <span style={S.dot}/>
            {active} ricerche attive
          </div>
        </div>
      </header>

      {/* TOOLBAR */}
      <div style={S.toolbar}>
        <button className="btn-primary" onClick={openAdd}
          style={{...S.btn,background:"var(--accent)",color:"#0b0c0f"}}>
          + Aggiungi ricerca
        </button>
        <button className="btn-ghost" onClick={loadFromGitHub}
          style={{...S.btn,background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border2)"}}>
          ↻ Ricarica
        </button>
        <button className="btn-ghost"
          onClick={()=>{sessionStorage.removeItem(SESSION_KEY);setAuthed(false);}}
          style={{...S.btn,background:"transparent",color:"var(--muted)",border:"1px solid var(--border2)",marginLeft:"auto"}}>
          🔒 Esci
        </button>
      </div>

      {/* INFO BANNER */}
      <div style={S.banner}>
        ⚡ Le modifiche vengono salvate <strong style={{color:"var(--accent)"}}>automaticamente</strong> su GitHub — nessun file da scaricare!
      </div>

      {/* LOADING */}
      {loading ? (
        <div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>
          <div className="spinner" style={{width:28,height:28,margin:"0 auto 16px",borderWidth:3}}/>
          <p>Caricamento ricerche da GitHub...</p>
        </div>
      ) : searches.length === 0 ? (
        <div style={S.empty}>
          <div style={{fontSize:48,marginBottom:16}}>🔍</div>
          <h3 style={{fontSize:20,marginBottom:8}}>Nessuna ricerca configurata</h3>
          <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>Aggiungi il tuo primo prodotto da monitorare</p>
          <button className="btn-primary" onClick={openAdd}
            style={{...S.btn,background:"var(--accent)",color:"#0b0c0f"}}>
            + Aggiungi ricerca
          </button>
        </div>
      ) : (
        <div style={S.list}>
          {searches.map((s,i)=>(
            <div key={s.id} className="card" style={{
              ...S.card, opacity:s.active?1:.45,
              animation:`fadeUp .4s ${i*60}ms both`
            }}>
              <button className={`toggle${s.active?" toggle-on":""}`}
                onClick={()=>toggleActive(s.id)} style={S.toggle}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={S.cardQuery}>{s.query}</div>
                <div style={S.cardMeta}>
                  <div style={S.priceBadge}>
                    <span style={{color:"var(--muted)",fontSize:11}}>MIN</span> €{s.min}
                    &nbsp;→&nbsp;
                    <span style={{color:"var(--muted)",fontSize:11}}>MAX</span> €{s.max}
                  </div>
                  {s.platforms.map(p=>(
                    <div key={p} style={{
                      ...S.platBadge,
                      color:PLATFORM_META[p].color,
                      borderColor:PLATFORM_META[p].color+"55",
                      background:PLATFORM_META[p].color+"11",
                    }}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:PLATFORM_META[p].color,display:"inline-block"}}/>
                      {PLATFORM_META[p].label}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="icon-btn" onClick={()=>openEdit(s)} style={S.iconBtn}>✏️</button>
                <button className="icon-btn del-btn" onClick={()=>setDeleteTgt(s.id)} style={S.iconBtn}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* GUIDE */}
      <div style={S.guide}>
        <div style={S.guideHeader}>⚙️ &nbsp;Come funziona</div>
        <div style={{padding:"20px 24px"}}>
          {[
            [1,<><strong>Aggiungi ricerche</strong> qui — vengono salvate automaticamente su GitHub</>],
            [2,<>GitHub Actions controlla eBay e Subito.it <strong>ogni 30 minuti</strong></>],
            [3,<>Quando trova annunci nel tuo range di prezzo ti manda una <strong>email</strong></>],
            [4,<>Puoi <strong>attivare/disattivare</strong> ogni ricerca con il toggle senza cancellarla</>],
          ].map(([n,text])=>(
            <div key={n} style={S.guideStep}>
              <div style={S.stepNum}>{n}</div>
              <div style={{fontSize:13,lineHeight:1.7,color:"var(--muted)"}}>{text}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ADD/EDIT MODAL */}
      {showModal&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&closeModal()}>
          <div style={{...S.modal,animation:"slideUp .25s cubic-bezier(.16,1,.3,1)"}}>
            <h2 style={{fontSize:20,fontWeight:800,letterSpacing:"-.4px",marginBottom:24}}>
              {editId?"Modifica ricerca":"Nuova ricerca"}
            </h2>
            <label style={S.label}>Prodotto da cercare</label>
            <input ref={inputRef} placeholder="es. MacBook M1, iPhone 14, PS5..."
              value={form.query} onChange={e=>setForm(f=>({...f,query:e.target.value}))}
              onKeyDown={e=>e.key==="Enter"&&handleSave()} style={S.input}/>
            <div style={{display:"flex",gap:12,marginBottom:20}}>
              <div style={{flex:1}}>
                <label style={S.label}>Prezzo minimo €</label>
                <input type="number" min="0" placeholder="es. 250"
                  value={form.min} onChange={e=>setForm(f=>({...f,min:e.target.value}))}
                  style={{...S.input,marginBottom:0}}/>
              </div>
              <div style={{flex:1}}>
                <label style={S.label}>Prezzo massimo €</label>
                <input type="number" min="0" placeholder="es. 350"
                  value={form.max} onChange={e=>setForm(f=>({...f,max:e.target.value}))}
                  style={{...S.input,marginBottom:0}}/>
              </div>
            </div>
            <label style={{...S.label,marginTop:20}}>Piattaforme</label>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              {Object.entries(PLATFORM_META).map(([key,meta])=>{
                const sel = form.platforms.includes(key);
                return(
                  <button key={key} onClick={()=>togglePlatform(key)} style={{
                    flex:1,padding:"10px 12px",borderRadius:10,
                    border:`1px solid ${sel?meta.color:"var(--border2)"}`,
                    background:sel?meta.color+"18":"var(--bg)",
                    color:sel?meta.color:"var(--muted)",
                    cursor:"pointer",fontFamily:"var(--font)",
                    fontSize:13,fontWeight:700,
                    display:"flex",alignItems:"center",justifyContent:"center",gap:7,
                    transition:"all .15s",
                  }}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:sel?meta.color:"#444"}}/>
                    {meta.label}
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:20,borderTop:"1px solid var(--border)"}}>
              <button className="btn-ghost" onClick={closeModal}
                style={{...S.btn,background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border2)"}}>
                Annulla
              </button>
              <button className="btn-primary" onClick={handleSave}
                style={{...S.btn,background:"var(--accent)",color:"#0b0c0f"}}>
                {editId?"Salva modifiche":"Aggiungi"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM DELETE */}
      {deleteTgt&&(
        <div style={S.overlay} onClick={e=>e.target===e.currentTarget&&setDeleteTgt(null)}>
          <div style={{...S.modal,maxWidth:340,textAlign:"center",animation:"slideUp .25s cubic-bezier(.16,1,.3,1)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑</div>
            <h3 style={{fontSize:18,marginBottom:8}}>Elimina ricerca?</h3>
            <p style={{color:"var(--muted)",fontSize:14,marginBottom:20}}>Questa azione non può essere annullata.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn-ghost" onClick={()=>setDeleteTgt(null)}
                style={{...S.btn,background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border2)"}}>
                Annulla
              </button>
              <button onClick={doDelete}
                style={{...S.btn,background:"transparent",color:"var(--danger)",border:"1px solid #3a1a1a"}}>
                Elimina
              </button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast&&(
        <div style={{
          ...S.toast,
          background:toast.type==="err"?"var(--danger)":"var(--text)",
          color:toast.type==="err"?"#fff":"var(--bg)",
          animation:"toastIn .2s cubic-bezier(.16,1,.3,1)",
        }}>{toast.msg}</div>
      )}
    </div>
  );
}
