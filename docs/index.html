<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PriceAlert Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0c0f; --surface: #131418; --border: #1f2128; --border2: #2a2d38;
      --text: #eef0f6; --muted: #6b7080; --accent: #c8f04e; --accent2: #7bf0c8;
      --danger: #ff5e5e; --radius: 14px;
      --font: 'Syne', sans-serif; --mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CHANGE THIS PASSWORD ──────────────────────────────────────────
const APP_PASSWORD = "Simpson84";
// ─────────────────────────────────────────────────────────────────

const SESSION_KEY = "pa_auth";
const STORAGE_KEY = "price_alert_searches";
const PLATFORM_META = {
  ebay:   { label: "eBay",      color: "#0064D2" },
  subito: { label: "Subito.it", color: "#e63f19" },
};

function uid() { return Math.random().toString(36).slice(2, 9); }

// ══════════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════════════════════
function Login({ onAuth }) {
  const [val, setVal] = useState("");
  const [shake, setShake] = useState(false);
  const [show, setShow] = useState(false);
  const ref = useRef(null);
  useEffect(() => ref.current?.focus(), []);

  function attempt() {
    if (val === APP_PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, "1");
      onAuth();
    } else {
      setShake(true);
      setVal("");
      setTimeout(() => setShake(false), 500);
    }
  }

  return (
    <div style={S.loginWrap}>
      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%,60%{transform:translateX(-8px)}
          40%,80%{transform:translateX(8px)}
        }
        @keyframes fadeUp {
          from{opacity:0;transform:translateY(20px)}
          to{opacity:1;transform:translateY(0)}
        }
        .login-box { animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both; }
        .login-box.shake input { animation: shake .4s; border-color: var(--danger) !important; }
      `}</style>
      <div className={`login-box${shake ? " shake" : ""}`} style={S.loginBox}>
        <div style={S.loginIcon}>🔔</div>
        <h1 style={S.loginTitle}>PriceAlert</h1>
        <p style={S.loginSub}>Inserisci la password per accedere</p>
        <div style={S.inputWrap}>
          <input
            ref={ref}
            type={show ? "text" : "password"}
            placeholder="Password"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === "Enter" && attempt()}
            style={S.loginInput}
          />
          <button onClick={() => setShow(s => !s)} style={S.eyeBtn}>{show ? "🙈" : "👁️"}</button>
        </div>
        <button onClick={attempt} style={S.loginBtn}>Accedi →</button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [authed, setAuthed] = useState(() => sessionStorage.getItem(SESSION_KEY) === "1");
  const [searches, setSearches] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
  });
  const [form, setForm] = useState({ query: "", min: "", max: "", platforms: ["ebay", "subito"] });
  const [editId, setEditId] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [toast, setToast] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(searches)); }, [searches]);
  useEffect(() => { if (showModal) setTimeout(() => inputRef.current?.focus(), 80); }, [showModal]);

  function showToast(msg, type = "ok") {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }

  function openAdd() {
    setForm({ query: "", min: "", max: "", platforms: ["ebay", "subito"] });
    setEditId(null); setShowModal(true);
  }
  function openEdit(s) {
    setForm({ query: s.query, min: String(s.min), max: String(s.max), platforms: [...s.platforms] });
    setEditId(s.id); setShowModal(true);
  }
  function closeModal() { setShowModal(false); setEditId(null); }

  function togglePlatform(p) {
    setForm(f => ({
      ...f,
      platforms: f.platforms.includes(p) ? f.platforms.filter(x => x !== p) : [...f.platforms, p]
    }));
  }

  function handleSave() {
    const query = form.query.trim();
    const min = parseFloat(form.min), max = parseFloat(form.max);
    if (!query) return showToast("Inserisci un prodotto", "err");
    if (isNaN(min) || isNaN(max) || min < 0 || max < 0) return showToast("Prezzi non validi", "err");
    if (min >= max) return showToast("Min deve essere < Max", "err");
    if (!form.platforms.length) return showToast("Scegli almeno una piattaforma", "err");

    if (editId) {
      setSearches(s => s.map(x => x.id === editId ? { ...x, query, min, max, platforms: form.platforms } : x));
      showToast("Ricerca aggiornata ✓");
    } else {
      setSearches(s => [...s, { id: uid(), query, min, max, active: true, platforms: form.platforms }]);
      showToast("Ricerca aggiunta ✓");
    }
    closeModal();
  }

  function toggleActive(id) {
    setSearches(s => s.map(x => x.id === id ? { ...x, active: !x.active } : x));
  }

  function doDelete() {
    setSearches(s => s.filter(x => x.id !== deleteTarget));
    setDeleteTarget(null); showToast("Ricerca eliminata");
  }

  function exportConfig() {
    const cfg = { generated: new Date().toISOString(), searches: searches.filter(s => s.active) };
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(cfg, null, 2)], { type: "application/json" }));
    a.download = "price-alert-config.json"; a.click();
    showToast("Config esportata ✓");
  }

  if (!authed) return <Login onAuth={() => setAuthed(true)} />;

  const active = searches.filter(s => s.active).length;

  return (
    <div style={S.page}>
      <style>{`
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        .card{transition:border-color .2s,transform .15s;}
        .card:hover{border-color:#2a2d38 !important;transform:translateY(-2px);}
        .icon-btn:hover{background:#1a1c24 !important;color:#eef0f6 !important;}
        .del-btn:hover{background:#2a1010 !important;color:#ff5e5e !important;border-color:#3a1a1a !important;}
        .toggle{transition:background .2s;}
        .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
        .toggle-on{background:var(--accent) !important;}
        .toggle-on::after{transform:translateX(18px);}
        .plat-btn{transition:all .15s;}
        .btn-primary:hover{background:#d8ff60 !important;}
        .btn-ghost:hover{background:#1a1c24 !important;color:#eef0f6 !important;}
        input:focus{border-color:var(--accent) !important;outline:none;}
      `}</style>

      {/* HEADER */}
      <header style={S.header}>
        <div>
          <div style={S.logo}>
            <div style={S.logoIcon}>🔔</div>
            <h1 style={S.h1}>PriceAlert</h1>
          </div>
          <p style={S.subtitle}>eBay + Subito.it · notifiche email automatiche</p>
        </div>
        <div style={S.statsPill}>
          <span style={S.dot} />
          {active} ricerche attive
        </div>
      </header>

      {/* TOOLBAR */}
      <div style={S.toolbar}>
        <button className="btn-primary" onClick={openAdd} style={{...S.btn, background:"var(--accent)", color:"#0b0c0f"}}>
          + Aggiungi ricerca
        </button>
        {searches.length > 0 && (
          <button className="btn-ghost" onClick={exportConfig} style={{...S.btn, background:"var(--surface)", color:"var(--muted)", border:"1px solid var(--border2)"}}>
            ↓ Esporta config JSON
          </button>
        )}
        <button className="btn-ghost" onClick={() => { sessionStorage.removeItem(SESSION_KEY); setAuthed(false); }}
          style={{...S.btn, background:"transparent", color:"var(--muted)", border:"1px solid var(--border2)", marginLeft:"auto"}}>
          🔒 Esci
        </button>
      </div>

      {/* INFO BANNER */}
      {searches.length > 0 && (
        <div style={S.banner}>
          💡 Esporta il JSON e caricalo come <code style={S.code}>price-alert-config.json</code> nel tuo repo GitHub
        </div>
      )}

      {/* EMPTY */}
      {searches.length === 0 ? (
        <div style={S.empty}>
          <div style={{fontSize:48,marginBottom:16}}>🔍</div>
          <h3 style={{fontSize:20,marginBottom:8}}>Nessuna ricerca configurata</h3>
          <p style={{color:"var(--muted)",fontSize:14,marginBottom:24}}>Aggiungi il tuo primo prodotto da monitorare</p>
          <button className="btn-primary" onClick={openAdd} style={{...S.btn,background:"var(--accent)",color:"#0b0c0f"}}>+ Aggiungi ricerca</button>
        </div>
      ) : (
        <div style={S.list}>
          {searches.map((s, i) => (
            <div key={s.id} className="card" style={{...S.card, opacity: s.active ? 1 : .45, animationDelay:`${i*60}ms`, animation:"fadeUp .4s both"}}>
              <button
                className={`toggle${s.active ? " toggle-on" : ""}`}
                onClick={() => toggleActive(s.id)}
                style={S.toggle}
              />
              <div style={{flex:1, minWidth:0}}>
                <div style={S.cardQuery}>{s.query}</div>
                <div style={S.cardMeta}>
                  <div style={S.priceBadge}>
                    <span style={{color:"var(--muted)",fontSize:11}}>MIN</span> €{s.min}
                    &nbsp;→&nbsp;
                    <span style={{color:"var(--muted)",fontSize:11}}>MAX</span> €{s.max}
                  </div>
                  {s.platforms.map(p => (
                    <div key={p} style={{
                      ...S.platBadge,
                      color: PLATFORM_META[p].color,
                      borderColor: PLATFORM_META[p].color + "55",
                      background: PLATFORM_META[p].color + "11",
                    }}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:PLATFORM_META[p].color,display:"inline-block"}} />
                      {PLATFORM_META[p].label}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button className="icon-btn" onClick={() => openEdit(s)} style={S.iconBtn}>✏️</button>
                <button className="icon-btn del-btn" onClick={() => setDeleteTarget(s.id)} style={S.iconBtn}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* GUIDE */}
      <div style={S.guide}>
        <div style={S.guideHeader}>⚙️ &nbsp;Come collegare a GitHub Actions</div>
        <div style={{padding:"20px 24px"}}>
          {[
            [1, <><strong>Configura</strong> le ricerche qui sopra e clicca <strong>"Esporta config JSON"</strong></>],
            [2, <>Carica <code style={S.code}>price-alert-config.json</code> nella <strong>root del tuo repo</strong> GitHub</>],
            [3, <>Lo scraper Python legge automaticamente questo file ad ogni run di <strong>GitHub Actions</strong></>],
            [4, <>Per aggiornare le ricerche: <strong>riesporta</strong> e sostituisci il file nel repo</>],
          ].map(([n, text]) => (
            <div key={n} style={S.guideStep}>
              <div style={S.stepNum}>{n}</div>
              <div style={{fontSize:13,lineHeight:1.7,color:"var(--muted)"}}>{text}</div>
            </div>
          ))}
        </div>
      </div>

      {/* ADD/EDIT MODAL */}
      {showModal && (
        <div style={S.overlay} onClick={e => e.target === e.currentTarget && closeModal()}>
          <div style={{...S.modal, animation:"slideUp .25s cubic-bezier(.16,1,.3,1)"}}>
            <h2 style={{fontSize:20,fontWeight:800,letterSpacing:"-.4px",marginBottom:24}}>
              {editId ? "Modifica ricerca" : "Nuova ricerca"}
            </h2>
            <label style={S.label}>Prodotto da cercare</label>
            <input ref={inputRef} placeholder="es. MacBook M1, iPhone 14, PS5..."
              value={form.query} onChange={e => setForm(f=>({...f,query:e.target.value}))}
              onKeyDown={e => e.key==="Enter" && handleSave()} style={S.input} />

            <div style={{display:"flex",gap:12,marginBottom:20}}>
              <div style={{flex:1}}>
                <label style={S.label}>Prezzo minimo €</label>
                <input type="number" min="0" placeholder="es. 250"
                  value={form.min} onChange={e=>setForm(f=>({...f,min:e.target.value}))} style={S.input} />
              </div>
              <div style={{flex:1}}>
                <label style={S.label}>Prezzo massimo €</label>
                <input type="number" min="0" placeholder="es. 350"
                  value={form.max} onChange={e=>setForm(f=>({...f,max:e.target.value}))} style={S.input} />
              </div>
            </div>

            <label style={S.label}>Piattaforme</label>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              {Object.entries(PLATFORM_META).map(([key,meta]) => {
                const sel = form.platforms.includes(key);
                return (
                  <button key={key} className="plat-btn" onClick={() => togglePlatform(key)} style={{
                    flex:1, padding:"10px 12px", borderRadius:10,
                    border: `1px solid ${sel ? meta.color : "var(--border2)"}`,
                    background: sel ? meta.color+"18" : "var(--bg)",
                    color: sel ? meta.color : "var(--muted)",
                    cursor:"pointer", fontFamily:"var(--font)",
                    fontSize:13, fontWeight:700,
                    display:"flex", alignItems:"center", justifyContent:"center", gap:7,
                  }}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:sel?meta.color:"#444"}} />
                    {meta.label}
                  </button>
                );
              })}
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:20,borderTop:"1px solid var(--border)"}}>
              <button className="btn-ghost" onClick={closeModal}
                style={{...S.btn,background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border2)"}}>
                Annulla
              </button>
              <button className="btn-primary" onClick={handleSave}
                style={{...S.btn,background:"var(--accent)",color:"#0b0c0f"}}>
                {editId ? "Salva modifiche" : "Aggiungi"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM DELETE */}
      {deleteTarget && (
        <div style={S.overlay} onClick={e => e.target===e.currentTarget && setDeleteTarget(null)}>
          <div style={{...S.modal,maxWidth:340,textAlign:"center",animation:"slideUp .25s cubic-bezier(.16,1,.3,1)"}}>
            <div style={{fontSize:36,marginBottom:12}}>🗑</div>
            <h3 style={{fontSize:18,marginBottom:8}}>Elimina ricerca?</h3>
            <p style={{color:"var(--muted)",fontSize:14,marginBottom:20}}>Questa azione non può essere annullata.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="btn-ghost" onClick={()=>setDeleteTarget(null)}
                style={{...S.btn,background:"var(--surface)",color:"var(--muted)",border:"1px solid var(--border2)"}}>
                Annulla
              </button>
              <button onClick={doDelete}
                style={{...S.btn,background:"transparent",color:"var(--danger)",border:"1px solid #3a1a1a"}}>
                Elimina
              </button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {toast && (
        <div style={{
          ...S.toast,
          background: toast.type==="err" ? "var(--danger)" : "var(--text)",
          color: toast.type==="err" ? "#fff" : "var(--bg)",
          animation:"toastIn .2s cubic-bezier(.16,1,.3,1)",
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// STYLES
// ══════════════════════════════════════════════════════════════════
const S = {
  // login
  loginWrap:  { minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20, background:"var(--bg)" },
  loginBox:   { background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:20, padding:"40px 36px", width:"100%", maxWidth:380, textAlign:"center" },
  loginIcon:  { fontSize:40, marginBottom:12 },
  loginTitle: { fontSize:26, fontWeight:800, letterSpacing:"-.5px", marginBottom:6 },
  loginSub:   { fontSize:14, color:"var(--muted)", marginBottom:28 },
  inputWrap:  { position:"relative", marginBottom:16 },
  loginInput: { width:"100%", background:"var(--bg)", border:"1px solid var(--border2)", borderRadius:10, padding:"12px 44px 12px 14px", fontSize:15, fontFamily:"var(--font)", color:"var(--text)", transition:"border-color .15s" },
  eyeBtn:     { position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:16, lineHeight:1 },
  loginBtn:   { width:"100%", background:"var(--accent)", color:"#0b0c0f", border:"none", borderRadius:10, padding:"13px", fontSize:15, fontWeight:800, cursor:"pointer", fontFamily:"var(--font)", letterSpacing:".3px" },
  // app
  page:     { maxWidth:780, margin:"0 auto", padding:"36px 20px 80px" },
  header:   { display:"flex", alignItems:"flex-end", justifyContent:"space-between", flexWrap:"wrap", gap:16, marginBottom:40 },
  logo:     { display:"flex", alignItems:"center", gap:10, marginBottom:6 },
  logoIcon: { width:36, height:36, background:"var(--accent)", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 },
  h1:       { fontSize:22, fontWeight:800, letterSpacing:"-.5px" },
  subtitle: { fontSize:13, color:"var(--muted)", fontFamily:"var(--mono)" },
  statsPill:{ background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:100, padding:"6px 14px", fontSize:13, fontFamily:"var(--mono)", color:"var(--muted)", display:"flex", alignItems:"center", gap:8 },
  dot:      { width:7, height:7, borderRadius:"50%", background:"var(--accent)", boxShadow:"0 0 8px var(--accent)", animation:"pulse 2s infinite", display:"inline-block" },
  toolbar:  { display:"flex", gap:10, flexWrap:"wrap", marginBottom:20, alignItems:"center" },
  btn:      { fontFamily:"var(--font)", fontSize:14, fontWeight:700, border:"none", cursor:"pointer", borderRadius:10, padding:"10px 20px", display:"flex", alignItems:"center", gap:8, letterSpacing:".3px" },
  banner:   { background:"#0e1a0a", border:"1px solid #1f3a10", borderRadius:12, padding:"12px 18px", fontSize:13, color:"var(--accent2)", fontFamily:"var(--mono)", marginBottom:20 },
  code:     { background:"var(--bg)", border:"1px solid var(--border2)", borderRadius:4, padding:"1px 6px", fontFamily:"var(--mono)", fontSize:12, color:"var(--accent)" },
  empty:    { border:"1px dashed var(--border2)", borderRadius:"var(--radius)", padding:"64px 32px", textAlign:"center" },
  list:     { display:"flex", flexDirection:"column", gap:12 },
  card:     { background:"var(--surface)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:"18px 22px", display:"flex", alignItems:"center", gap:18, cursor:"default" },
  toggle:   { width:40, height:22, background:"var(--border2)", borderRadius:100, border:"none", cursor:"pointer", position:"relative", flexShrink:0 },
  cardQuery:{ fontSize:17, fontWeight:700, letterSpacing:"-.3px", marginBottom:8, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" },
  cardMeta: { display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" },
  priceBadge:{ display:"flex", alignItems:"center", gap:5, background:"#0e1a0a", border:"1px solid #1f3a10", borderRadius:8, padding:"4px 10px", fontFamily:"var(--mono)", fontSize:13, color:"var(--accent2)" },
  platBadge:{ display:"flex", alignItems:"center", gap:5, borderRadius:6, padding:"3px 8px", fontSize:11, fontWeight:700, letterSpacing:".4px", textTransform:"uppercase", border:"1px solid" },
  iconBtn:  { width:34, height:34, borderRadius:8, border:"1px solid var(--border2)", background:"transparent", color:"var(--muted)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14 },
  // modal
  overlay:  { position:"fixed", inset:0, background:"rgba(0,0,0,.75)", backdropFilter:"blur(4px)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:20 },
  modal:    { background:"var(--surface)", border:"1px solid var(--border2)", borderRadius:20, width:"100%", maxWidth:460, padding:32 },
  label:    { display:"block", fontSize:11, fontWeight:700, letterSpacing:"1px", textTransform:"uppercase", color:"var(--muted)", marginBottom:8, fontFamily:"var(--mono)" },
  input:    { width:"100%", background:"var(--bg)", border:"1px solid var(--border2)", borderRadius:10, padding:"11px 14px", fontSize:15, fontFamily:"var(--font)", color:"var(--text)", marginBottom:20, transition:"border-color .15s" },
  // guide
  guide:    { marginTop:40, border:"1px solid var(--border2)", borderRadius:"var(--radius)", overflow:"hidden" },
  guideHeader:{ background:"#131418", padding:"14px 24px", fontSize:13, fontWeight:700, fontFamily:"var(--mono)", color:"var(--muted)", borderBottom:"1px solid var(--border)" },
  guideStep:{ display:"flex", gap:14, alignItems:"flex-start", marginBottom:16 },
  stepNum:  { width:24, height:24, borderRadius:6, background:"var(--accent)", color:"#0b0c0f", fontSize:12, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 },
  // toast
  toast:    { position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)", padding:"12px 22px", borderRadius:100, fontSize:14, fontWeight:700, boxShadow:"0 8px 32px rgba(0,0,0,.4)", zIndex:999, whiteSpace:"nowrap" },
